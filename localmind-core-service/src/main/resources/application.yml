server:
  port: 8085

spring:
  application:
    name: localmind-agent-platform
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${AI_MODEL:qwen3.6-plus}
          temperature: 0.2
          max-tokens: 1200
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere.yaml
  data:
    redis:
      database: 0
      password: yaochen123
      host: 127.0.0.1
      port: 6379
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1
  jackson:
    default-property-inclusion: non_null
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    generator:
      WRITE_NUMBERS_AS_STRINGS: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: create_voucher_order
      enable-auto-commit: false
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual_immediate

mybatis-plus:
  type-aliases-package: org.javaup.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement

logging:
  level:
    org.javaup: info
    AUDIT: INFO
  pattern:
    dateformat: mm:ss.SSS

bloom-filter:
  filters:
    shop:
      name: shop-id-bloom
      expected-insertions: 50000
      false-probability: 0.01
    voucher:
      name: voucher-id-bloom
      expected-insertions: 100000
      false-probability: 0.01

localmind:
  image-upload-dir: ./data/uploads/imgs/
  nearby:
    real-coordinate-enabled: false
    mock-x: 120.149993
    mock-y: 30.334229
  recommendation:
    enabled: true
    max-message-chars: 500
    max-session-id-chars: 80
    max-candidates: 20
    max-recommendation-size: 3
    max-context-chars: 6000
    max-vouchers-per-shop: 2
    fallback-enabled: true
    json-schema-enabled: false
    rule-matching-enabled: false
    circuit-breaker:
      key-prefix: agent:recommendation:llm:circuit
      failure-threshold: 3
      failure-window-seconds: 60
      open-seconds: 60
    rate-limit:
      enabled: true
      key-prefix: agent:recommendation:rate
      window-seconds: 60
      max-requests: 20

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  prometheus:
    metrics:
      export:
        enabled: true
